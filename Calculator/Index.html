<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    
    <div id="calculator">
        <input id="display" readonly>
        <div id="keys">
            <button onclick="icons('+')">+</button>
            <button onclick="icons('1')">1</button>
            <button onclick="icons('2')">2</button>
            <button onclick="icons('3')">3</button>
            <button onclick="icons('-')">-</button>
            <button onclick="icons('4')">4</button>
            <button onclick="icons('5')">5</button>
            <button onclick="icons('6')">6</button>
            <button onclick="icons('/')">/</button>
            <button onclick="icons('7')">7</button>
            <button onclick="icons('8')">8</button>
            <button onclick="icons('9')">9</button>
            <button onclick="icons('*')">*</button>
            <button onclick="icons('0')">0</button>
            <button onclick="calculate()">=</button>
            <button onclick="clearDisplay()">Reset</button>

        </div>
    </div>
     <script src="Index.js"></script>
</body>
</html>
